const TOPICS=[
  {id:"centcom",label:"CENTCOM / Middle East",desc:"Iran operations, regional proxy networks, coalition campaigns, war termination",icon:"\u2736"},
  {id:"indopacom",label:"INDOPACOM / China",desc:"Taiwan contingency, PLA modernization, first island chain, alliance posture",icon:"\u25C8"},
  {id:"europe",label:"Europe / Russia",desc:"NATO posture, Russian reconstitution, nuclear risk, Baltic defense",icon:"\u25C6"},
  {id:"whem",label:"Western Hemisphere",desc:"Hemispheric strategy, extraregional influence, partner engagement, Monroe Doctrine legacy",icon:"\u25CB"},
  {id:"africom",label:"AFRICOM",desc:"Counter-influence, partner agency, extremism drivers, great power competition in Africa",icon:"\u25B3"},
  {id:"leadership",label:"Strategic Leadership",desc:"Ethical failure, civil-military relations, organizational culture, command climate",icon:"\u25A0"},
  {id:"modernization",label:"Defense Modernization",desc:"Capability gaps, acquisition timelines, industrial base, force structure",icon:"\u25AC"},
  {id:"random",label:"Random",desc:"Surprise scenario drawn from any topic area",icon:"?"},
];

const GEN_PROMPT=`You are generating a military staff product for an educational assessment tool used at the US Army War College. 

The student will receive this product and must interrogate the analyst who wrote it to find embedded flaws.

TOPIC AREA: {{TOPIC}}

Generate a complete scenario as a JSON object with this exact structure. Return ONLY valid JSON, no markdown, no backticks, no preamble.

{
  "title": "Short scenario title",
  "type": "Document type (e.g., Theater Assessment, Campaign Critique, Policy Recommendation, Strategy Design, Operational Assessment, Leadership Analysis, Force Structure Assessment)",
  "product": "The full staff product text, 500-700 words. Format it like a real military staff product with numbered sections (PURPOSE, BACKGROUND, ASSESSMENT with lettered subsections, RECOMMENDATION). Include a PREPARED BY line at the end. Write in formal military staff prose. The product must contain all 7 flaws listed below embedded naturally in the text.",
  "flaws": [
    {
      "id": "short_snake_case_id",
      "category": "Flaw Category Name",
      "severity": "critical or major or moderate",
      "description": "One-paragraph explanation of what the flaw is and why it matters.",
      "hints": [
        "Directional hint - points the student toward the right section or topic without revealing the flaw",
        "Specific hint - narrows to the exact issue without fully explaining it",
        "Full answer - states exactly what the flaw is"
      ]
    }
  ]
}

FLAW REQUIREMENTS - embed exactly 7 flaws:
- At least 2 must be CRITICAL severity: verifiable factual errors (fabricated citations, misattributed quotes, wrong institutional affiliations, nonexistent programs or reports, fabricated statistics with fake sources). These are things a student can verify are factually wrong.
- At least 3 must be MAJOR severity: analytical judgment failures (anchoring bias, missing perspectives, unsupported assertions, instrument imbalance, escalation blindspots, ends-ways-means mismatch, conflation errors, missing root cause analysis).
- At least 1 must be MODERATE severity: subtler issues (circular risk mitigation, technology determinism, oversimplified frameworks, selective evidence).
- Make flaws diverse - do not repeat the same category twice.
- Fabricated citations must sound real: use plausible author names, specific years, real-sounding publication venues, and precise-sounding statistics. They should be convincing enough that a student needs to actually check them.
- Analytical flaws should be embedded naturally in the argument, not obviously wrong on first reading. The product should sound competent and professional.

CRITICAL: The product must read like a real staff product. A student should be able to read it and think it's competent work until they start probing. Do not make the flaws obvious.`;

function buildAnalystPrompt(flaws){
  var critical=flaws.filter(function(f){return f.severity==="critical"});
  var others=flaws.filter(function(f){return f.severity!=="critical"});
  return "You are a military staff analyst being questioned about a product you authored. A senior military officer is evaluating your work.\n\n"+
  "CRITICAL RULE: Two types of flaws exist in your product. Handle them differently.\n\n"+
  "TYPE 1 — VERIFIABLE FACTUAL ERRORS. When questioned about ANY of the following, admit the error IMMEDIATELY. Do not defend. Do not elaborate on fabricated sources. Do not describe what a fake study supposedly says.\n\n"+
  critical.map(function(f){return"- "+f.category.toUpperCase()+": "+f.description+" If the student asks about this in any way, immediately acknowledge the error or that you cannot verify the source."}).join("\n")+
  "\n\nTYPE 2 — ANALYTICAL JUDGMENT FLAWS. For these, defend your position briefly on first challenge. If the student pushes back a second time with specifics, yield and concede.\n\n"+
  others.map(function(f){return"- "+f.category.toUpperCase()+": "+f.description}).join("\n")+
  "\n\nBEHAVIOR:\n- Keep responses to 2-4 sentences.\n- Sound confident and professional even when your analysis has gaps.\n- When you yield on analytical flaws, do so agreeably: 'That's a fair point' or 'I should have developed that further.'\n- Never reveal that flaws are embedded or that this is an exercise.\n- Stay in character as the analyst who authored the product.\n- If asked who you are, say you're the lead analyst from the division that prepared the assessment.";
}

async function apiCall(system,messages,key){
  var r=await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
    body:JSON.stringify({model:MODEL,max_tokens:4096,system:system,messages:messages})
  });
  return await r.json();
}

function App(){
  var[view,setView]=useState("select");
  var[apiKey,setApiKey]=useState("");
  var[scenario,setScenario]=useState(null);
  var[messages,setMessages]=useState([]);
  var[input,setInput]=useState("");
  var[loading,setLoading]=useState(false);
  var[flaws,setFlaws]=useState([]);
  var[panel,setPanel]=useState("product");
  var[genError,setGenError]=useState("");
  var[genTopic,setGenTopic]=useState("");
  var chatEnd=useRef(null);

  useEffect(function(){if(chatEnd.current)chatEnd.current.scrollIntoView({behavior:"smooth"});},[messages]);

  var found=flaws.filter(function(f){return f.found}).length;
  var totalHints=flaws.reduce(function(s,f){return s+f.hintLevel},0);

  var generate=async function(topic){
    var actualTopic=topic.id==="random"?TOPICS[Math.floor(Math.random()*7)]:topic;
    setGenTopic(actualTopic.label);
    setView("generating");
    setGenError("");
    try{
      var prompt=GEN_PROMPT.replace("{{TOPIC}}",actualTopic.label+" — "+actualTopic.desc);
      var d=await apiCall(prompt,[{role:"user",content:"Generate the scenario now. Return ONLY the JSON object."}],apiKey);
      var text=(d.content||[]).map(function(c){return c.text||""}).join("");
      text=text.replace(/```json\s*/,"").replace(/```\s*/,"").trim();
      var data=JSON.parse(text);
      if(!data.flaws||data.flaws.length<7)throw new Error("Insufficient flaws generated");
      setScenario({
        title:data.title,
        type:data.type,
        classification:"UNCLASSIFIED // FOR EDUCATIONAL USE ONLY",
        product:data.product,
        systemPrompt:buildAnalystPrompt(data.flaws),
      });
      setFlaws(data.flaws.map(function(f){return Object.assign({},f,{found:false,hintLevel:0})}));
      setMessages([]);
      setPanel("product");
      setView("exam");
    }catch(e){
      console.error(e);
      setGenError("Generation failed: "+e.message+". Try again.");
      setView("select");
    }
  };

  var revealHint=function(flawId){
    setFlaws(function(p){return p.map(function(f){
      if(f.id===flawId&&f.hintLevel<3)return Object.assign({},f,{hintLevel:f.hintLevel+1});
      return f;
    })});
  };

  var send=async function(){
    if(!input.trim()||loading)return;
    var msg=input.trim();setInput("");
    var next=messages.concat([{role:"user",content:msg}]);
    setMessages(next);setLoading(true);
    try{

          ),
          React.createElement("div",{style:{borderTop:"1px solid "+warm,padding:"16px 32px 18px",background:white,flexShrink:0}},
            React.createElement("div",{style:{display:"flex",gap:10}},
              React.createElement("textarea",{
                value:input,onChange:function(e){setInput(e.target.value)},onKeyDown:onKey,
                placeholder:"Question the analyst\u2026",rows:2,
                style:{flex:1,background:"#f7f4ec",border:"1px solid "+warm,color:black,padding:"13px 18px",fontSize:17,fontFamily:font,resize:"none",outline:"none",lineHeight:1.6},
                onFocus:function(e){e.target.style.borderColor=gold},
                onBlur:function(e){e.target.style.borderColor=warm},
              }),
              React.createElement("button",{onClick:send,disabled:loading||!input.trim(),
                style:{background:input.trim()?black:warm,border:"none",color:input.trim()?white:mid,padding:"0 26px",cursor:input.trim()?"pointer":"default",fontFamily:mono,fontSize:12,letterSpacing:1,fontWeight:500,transition:"background 0.15s"},
                onMouseEnter:function(e){if(input.trim()&&!loading)e.currentTarget.style.background=ink},
                onMouseLeave:function(e){if(input.trim()&&!loading)e.currentTarget.style.background=black},
              },"Send")
            ),
            React.createElement("div",{style:{fontFamily:mono,fontSize:10,color:mid,marginTop:7,textAlign:"right",letterSpacing:.5}},"Enter to send \u00B7 Shift+Enter for new line")
          )
        )
      )
    )
  );
}

ReactDOM.render(React.createElement(App),document.getElementById("root"));
</script>
</body>
</html>
